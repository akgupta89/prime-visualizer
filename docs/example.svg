      svg { --ink:#e6edf3; --mark:#ff7b72; --line:#56d364; --muted:#9198a1; --surface:#0d1117; --border:#30363d; --code:#58a6ff; }
    }
    .bg   { fill:var(--surface); stroke:var(--border); stroke-width:1; }
    .vec  { stroke:var(--line); stroke-width:2; stroke-linecap:round; }
    .arc  { stroke:var(--muted); stroke-width:1; fill:none; opacity:.75; }
    .tail { stroke:var(--line); stroke-width:1.1; fill:none; opacity:.7; stroke-linejoin:round; stroke-linecap:round; }
    .dot  { fill:var(--ink); }
    .seed { fill:var(--mark); }
    text  { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .p     { fill:var(--ink);   font-size:13.5px; font-weight:600; text-anchor:middle; }
    .delta { fill:var(--muted); font-size:11px; text-anchor:middle; }
    .sym   { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; fill:var(--code); font-weight:600; }
    .cap   { fill:var(--muted); font-size:12.5px; text-anchor:middle; }
    .mono  { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; fill:var(--code); font-weight:600; }
    .em    { font-style:italic; fill:var(--ink); }
  </style>
