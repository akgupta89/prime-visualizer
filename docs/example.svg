  <title id="ttl">Primes drawn as vectors laid head to tail, each turned 36 degrees from the last. After sixty primes the walk traces a spiral.</title>
  <style>
    svg { --ink:#1f2328; --mark:#cf222e; --line:#116329; --muted:#59636e; --surface:#ffffff; --border:#d1d9e0; --code:#0969da; }
